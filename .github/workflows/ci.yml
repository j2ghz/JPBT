name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Install RustFS
        run: |
          brew tap rustfs/homebrew-tap
          brew install rustfs
          rustfs --version

      - name: Start RustFS
        if: false
        run: |
          mkdir -p /tmp/rustfs-data
          RUSTFS_ACCESS_KEY=minioadmin \
          RUSTFS_SECRET_KEY=minioadmin \
          RUSTFS_VOLUMES=/tmp/rustfs-data \
          RUSTFS_ADDRESS=:9000 \
          RUSTFS_CONSOLE_ENABLE=false \
          RUST_LOG=error \
          rustfs /tmp/rustfs-data &
          # Wait for it to be ready
          until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done

      - name: Build
        run: make build

      - name: Test
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
        run: make test
