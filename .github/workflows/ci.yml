name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-26
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install RustFS
        if: false
        run: |
          brew tap rustfs/homebrew-tap
          brew install rustfs
          rustfs --version

      - name: Start RustFS
        if: false
        run: |
          mkdir -p /tmp/rustfs-data
          RUSTFS_ACCESS_KEY=minioadmin \
          RUSTFS_SECRET_KEY=minioadmin \
          RUSTFS_VOLUMES=/tmp/rustfs-data \
          RUSTFS_ADDRESS=:9000 \
          RUSTFS_CONSOLE_ENABLE=false \
          RUST_LOG=error \
          rustfs /tmp/rustfs-data &
          # Wait for it to be ready
          until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done

      - name: Build
        run: make build EXTRA="CODE_SIGNING_ALLOWED=NO"

      - name: Test
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
        run: make test EXTRA="CODE_SIGNING_ALLOWED=NO -enableCodeCoverage YES"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad
        with:
          use_oidc: true
          report_type: coverage

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad
        with:
          use_oidc: true
          report_type: test_results
